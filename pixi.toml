[workspace]
name = "fastMatMR"
version = "0.1.0"
description = "Add a short description here"
authors = ["Rohit Goswami <rog32@hi.is>"]
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64"]

[tasks]

[dependencies]
r-renv = "1.0.2.*"
compilers = "1.6.0.*"
radian = "0.6.7.*"
ipython = "8.14.0.*"
fast_matrix_market = "1.7.4.*"
numpy = "1.25.2.*"
scipy = "1.11.2.*"
towncrier = "23.6.0.*"
tbump = "6.9.0.*"

[feature.bench.dependencies]
compilers = ">=1.6"
r-base = ">=4.3"
r-cpp11 = ">=0.5.0"
r-matrix = ">=1.6"
r-spam = ">=2.9"
r-sparsem = ">=1.84"
pip = "*"

[feature.bench.pypi-dependencies]
asv = ">=0.6"
scipy = ">=1.11"

[feature.check.dependencies]
compilers = ">=1.6"
r-base = ">=4.3"
r-cpp11 = ">=0.5.0"
r-matrix = ">=1.6"
r-testthat = ">=3.0.0"
r-knitr = ">=1.40"
r-rmarkdown = ">=2.20"
r-ggplot2 = ">=3.4"
r-microbenchmark = ">=1.4"
r-spam = ">=2.9"
r-sparsem = ">=1.84"

[feature.check.tasks]
build = { cmd = "R CMD build ." }
check = { cmd = "R CMD check --as-cran fastMatMR_*.tar.gz", depends-on = ["build"] }

[environments]
bench = { features = ["bench"], solve-group = "default" }
check = { features = ["check"], solve-group = "default" }
